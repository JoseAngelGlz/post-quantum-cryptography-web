<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/q-orbita.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="PostQ · Aprende criptografía post-cuántica, ML-KEM y ML-DSA de forma visual e interactiva" />
    <title>PostQ · Criptografía Post-Cuántica</title>
    <script>
      try {
        var t = localStorage.getItem('postq-theme');
        if (t === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
