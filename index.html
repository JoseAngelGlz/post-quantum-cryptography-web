<!doctype html>
<html lang="es" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Quanta · Aprende criptografía post-cuántica y ML-KEM de forma visual e interactiva" />
    <title>Quanta · Criptografía Post-Cuántica · ML-KEM</title>
    <script>
      try {
        var t = localStorage.getItem('quanta-theme');
        if (t === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
